events {}

http {
    # Round-robin across all main servers for read-only requests.
    # Any server can handle reads since they all share the same PostgreSQL database.
    upstream all_servers {
        server main-server-1:8000 max_fails=3 fail_timeout=10s;
        server main-server-2:8000 max_fails=3 fail_timeout=10s;
        server main-server-3:8000 max_fails=3 fail_timeout=10s;
        server main-server-4:8000 max_fails=3 fail_timeout=10s;
        server main-server-5:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        # Use Docker's embedded DNS so hostnames resolve at request time, not at startup.
        resolver 127.0.0.11 valid=5s ipv6=off;

        # Download requests are read-only — route to any server (followers included).
        # This distributes download load across the cluster instead of hitting only the leader.
        location ~ ^/files/[^/]+/download/$ {
            proxy_pass http://all_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other requests (uploads, deletes, auth, elections) go to the current leader.
        location / {
            # upstream.conf contains: proxy_pass http://<leader-host:port>;
            include /etc/nginx/upstream.conf;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
