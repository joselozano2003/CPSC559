events {}

http {
    upstream all_servers {
        server main-server-1:8000 max_fails=1 fail_timeout=5s;
        server main-server-2:8000 max_fails=1 fail_timeout=5s;
        server main-server-3:8000 max_fails=1 fail_timeout=5s;
        server main-server-4:8000 max_fails=1 fail_timeout=5s;
        server main-server-5:8000 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;
        resolver 127.0.0.11 valid=5s ipv6=off;

        location / {
            proxy_pass http://all_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 5;
        }
    }
}
