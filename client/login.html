<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Distributed File Storage</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 0;
        }

        .login-container {
            max-width: 420px;
            margin: 100px auto;
            padding: 24px;
            background: #111;
            border: 1px solid #444;
        }

        h1 {
            color: #9cdcfe;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #9cdcfe;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 6px 8px;
            background: #2d2d2d;
            border: 1px solid #555;
            color: #d4d4d4;
            box-sizing: border-box;
        }

        button {
            padding: 8px 20px;
            background: #0e639c;
            color: white;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }

        button:hover {
            background: #1177bb;
        }

        #auth-status {
            margin-top: 8px;
            font-size: 13px;
            color: #888;
        }

        #auth-status.ok {
            color: #4ec9b0;
        }

        #auth-status.err {
            color: #f44747;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Distributed File Storage</h1>

        <div class="section">
            <label for="master-url">Master Server URL</label>
            <input type="text" id="master-url" value="http://localhost" />
        </div>

        <div class="section">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="section">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="password" />
        </div>

        <div class="section">
            <button id="btn-login">Login</button>
            <div id="auth-status">Not logged in</div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
