version: "3.9"

# ============================================================
# Proxy for Teammate A — nodes 1 & 2 (ports 6000 and 6001).
# Routes /node1/ -> 6000, /node2/ -> 6001.
#
# Run after starting both storage nodes:
#   docker compose -p node1 -f docker-compose.yml up --build -d
#   docker compose -p node2 -f docker-compose.node2.yml up --build -d
#   docker compose -f docker-compose.proxy12.yml up --build -d
#
# Then expose via ngrok:
#   ngrok http 7000
# ============================================================

services:
  storage-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile12
    ports:
      - "7000:7000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
