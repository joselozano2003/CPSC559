version: '3.8'

services:
  minio5:
    image: minio/minio:latest
    ports:
      - "9008:9000"
      - "9009:9001"
    volumes:
      - minio5_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      cps559_network:
        aliases:
          - minio5

  createbuckets5:
    image: minio/mc:latest
    depends_on:
      minio5:
        condition: service_healthy
    networks:
      - cps559_network
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio5:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      "

  db-node5:
    image: postgres:15
    volumes:
      - postgres5_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_flask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cps559_network

  storage-node5:
    build: .
    volumes:
      - .:/app
    ports:
      - "6004:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db-node5:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=http://nginx
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio5:9000
      - BUCKET_NAME=cpsc559-images
      - MINIO_PUBLIC_HOST=localhost:9008
      - NODE_NAME=storage-node-5
      - NODE_ADDRESS=http://storage-node5:6000
      - INTERNAL_SECRET=cps559-internal-key
    networks:
      - cps559_network
    depends_on:
      db-node5:
        condition: service_healthy
      createbuckets5:
        condition: service_completed_successfully

volumes:
  postgres5_data:
  minio5_data:

networks:
  cps559_network:
    external: true
