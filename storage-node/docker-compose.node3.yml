version: '3.8'

# ============================================================
# Storage Node 3 — runs on Machine 3 (IP: 192.168.1.102), port 6000
# Also runs alongside node 4 on this machine.
# Start with: docker compose -p node3 -f docker-compose.node3.yml up --build
#
# Replace 192.168.1.100 with Machine 1's actual IP (main-server + nginx).
# Replace 192.168.1.102 with Machine 3's actual IP.
# ============================================================

services:
  minio3:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio3_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - storage_net3

  createbuckets3:
    image: minio/mc:latest
    depends_on:
      minio3:
        condition: service_healthy
    networks:
      - storage_net3
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio3:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      "

  db-node3:
    image: postgres:15
    volumes:
      - postgres3_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_flask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storage_net3

  storage-node3:
    build: .
    volumes:
      - .:/app
    ports:
      - "6000:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db-node3:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=http://70.72.64.190:8080  # <-- replace with Machine 1's IP
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio3:9000
      - BUCKET_NAME=cpsc559-images
      - MINIO_PUBLIC_HOST=172.225.43.143:9000  # <-- replace with this machine's IP
      - NODE_NAME=storage-node-3
      - NODE_ADDRESS=http://172.225.43.143:6000  # <-- replace with this machine's IP
      - INTERNAL_SECRET=cps559-internal-key
    networks:
      - storage_net3
    depends_on:
      db-node3:
        condition: service_healthy
      createbuckets3:
        condition: service_completed_successfully

volumes:
  postgres3_data:
  minio3_data:

networks:
  storage_net3:
    driver: bridge
