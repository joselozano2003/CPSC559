version: '3.8'

services:

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Configuring MinIO...';
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      echo 'MinIO configuration complete';
      exit 0;
      "
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cps559_network

  storage-node:
    build: .
    volumes:
      - .:/app
    ports:
      - "6000:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=http://main-server:8000
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio:9000
      - BUCKET_NAME=cpsc559-images
    networks:
      - cps559_network
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:

networks:
  cps559_network:
    external: true