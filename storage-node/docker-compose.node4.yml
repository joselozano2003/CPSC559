version: '3.8'

# ============================================================
# Storage Node 4 — runs on Machine 3 (IP: 192.168.1.102), port 6001
# Also runs alongside node 3 on this machine.
# Start with: docker compose -p node4 -f docker-compose.node4.yml up --build
#
# Replace 192.168.1.100 with Machine 1's actual IP (main-server + nginx).
# Replace 192.168.1.102 with Machine 3's actual IP.
# ============================================================

services:
  minio4:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio4_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - storage_net4

  createbuckets4:
    image: minio/mc:latest
    depends_on:
      minio4:
        condition: service_healthy
    networks:
      - storage_net4
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio4:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      "

  db-node4:
    image: postgres:15
    volumes:
      - postgres4_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_flask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storage_net4

  storage-node4:
    build: .
    volumes:
      - .:/app
    ports:
      - "6001:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db-node4:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=https://shine-preachy-crystal.ngrok-free.dev/  # <-- replace with Machine 1's IP
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio4:9000
      - BUCKET_NAME=cpsc559-images
      - MINIO_PUBLIC_HOST=192.168.1.102:9002  # <-- replace with this machine's IP
      - NODE_NAME=storage-node-4
      - NODE_ADDRESS=http://192.168.1.102:6001  # <-- replace with this machine's IP
      - INTERNAL_SECRET=cps559-internal-key
    networks:
      - storage_net4
    depends_on:
      db-node4:
        condition: service_healthy
      createbuckets4:
        condition: service_completed_successfully

volumes:
  postgres4_data:
  minio4_data:

networks:
  storage_net4:
    driver: bridge
