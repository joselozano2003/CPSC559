version: '3.8'

services:
  minio4:
    image: minio/minio:latest
    ports:
      - "9006:9000"
      - "9007:9001"
    volumes:
      - minio4_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets4:
    image: minio/mc:latest
    depends_on:
      minio4:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio4:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      exit 0;
      "

  db-node4:
    image: postgres:15
    volumes:
      - postgres4_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_flask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cps559_network

  storage-node4:
    build: .
    volumes:
      - .:/app
    ports:
      - "6003:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db-node4:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=http://nginx
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio4:9000
      - BUCKET_NAME=cpsc559-images
      - MINIO_PUBLIC_HOST=localhost:9006
      - NODE_NAME=storage-node-4
      - NODE_ADDRESS=http://storage-node4:6000
      - INTERNAL_SECRET=cps559-internal-key
    networks:
      - cps559_network
    depends_on:
      db-node4:
        condition: service_healthy
      createbuckets4:
        condition: service_completed_successfully

volumes:
  postgres4_data:
  minio4_data:

networks:
  cps559_network:
    external: true
