version: '3.8'

# ============================================================
# Storage Node 2 — Machine IP: 192.168.1.102
# Replace 192.168.1.100 with the actual IP of the main-server machine (nginx).
# Replace 192.168.1.102 with the actual IP of this machine.
# ============================================================

services:

  minio2:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio2_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - storage_net

  createbuckets2:
    image: minio/mc:latest
    depends_on:
      minio2:
        condition: service_healthy
    networks:
      - storage_net
    entrypoint: >
      /bin/sh -c "
      set -e;
      echo 'Configuring MinIO node 2...';
      /usr/bin/mc alias set myminio http://minio2:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/cpsc559-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/cpsc559-images;
      echo 'MinIO node 2 configuration complete';
      "

  db-node2:
    image: postgres:15
    volumes:
      - postgres2_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hello_flask
      - POSTGRES_PASSWORD=hello_password
      - POSTGRES_DB=flask_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_flask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storage_net

  storage-node2:
    build: .
    volumes:
      - .:/app
    ports:
      - "6000:6000"
    environment:
      - DATABASE_URL=postgresql://hello_flask:hello_password@db-node2:5432/flask_db
      - FLASK_DEBUG=1
      - MAIN_SERVER_URL=http://192.168.1.100  # <-- replace with main-server machine IP
      - BUCKET_ACCESS_KEY_ID=minioadmin
      - BUCKET_SECRET_ACCESS_KEY=minioadmin123
      - BUCKET_ENDPOINT_URL=http://minio2:9000
      - BUCKET_NAME=cpsc559-images
      - MINIO_PUBLIC_HOST=192.168.1.102:9000  # <-- replace with this machine's IP
      - NODE_NAME=storage-node-2
      - NODE_ADDRESS=http://192.168.1.102:6000  # <-- replace with this machine's IP
      - INTERNAL_SECRET=cps559-internal-key
    networks:
      - storage_net
    depends_on:
      db-node2:
        condition: service_healthy
      createbuckets2:
        condition: service_completed_successfully

volumes:
  postgres2_data:
  minio2_data:

networks:
  storage_net:
    driver: bridge
